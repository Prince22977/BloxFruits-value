<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blox Trade & Values</title>
  
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen flex flex-col font-sans">

  <!-- Header & Navigation -->
  <header class="bg-panel border-b border-gray-800 p-4 sticky top-0 z-40">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
      <h1 class="text-2xl font-black text-blue-500 tracking-wider">BLOX<span class="text-white">TRADE</span></h1>
      <nav class="flex space-x-2 bg-gray-900 rounded-lg p-1">
        <button id="btn-calc" class="px-4 py-2 rounded-md bg-blue-600 font-bold shadow transition text-white" onclick="switchTab('calculator')">Calculator</button>
        <button id="btn-values" class="px-4 py-2 rounded-md hover:bg-gray-700 font-bold text-gray-300 transition" onclick="switchTab('values')">Value List</button>
      </nav>
    </div>
  </header>

  <!-- Top Ad Zone -->
  <div class="max-w-6xl mx-auto w-full mt-4 bg-gray-800 h-24 flex items-center justify-center text-gray-500 text-sm border border-dashed border-gray-600 rounded-lg">
    [ Ad Banner Space - 728x90 ]
  </div>

  <!-- Main Content Area -->
  <main class="flex-grow max-w-6xl mx-auto w-full p-4 mt-4">

    <!-- VIEW 1: CALCULATOR -->
    <section id="view-calculator" class="block">
      <!-- W/F/L Indicator bar -->
      <div id="status-bar" class="w-full bg-panel p-4 rounded-lg text-center mb-6 border border-gray-700 transition-colors">
        <h2 id="status-text" class="text-2xl font-black text-gray-400">ADD FRUITS TO START TRADING</h2>
      </div>

      <!-- Trade Slots -->
      <div class="flex flex-col md:flex-row gap-6">
        <!-- Your Offer -->
        <div class="flex-1 bg-panel p-4 rounded-lg border-2 border-green-500/50 relative flex flex-col justify-between">
          <div>
            <h3 class="text-center font-bold text-green-400 mb-1">YOUR OFFER</h3>
            <div id="your-total" class="text-center text-2xl font-black mb-4 text-white">0</div>
            <div id="your-offer-grid" class="grid grid-cols-2 gap-2 min-h-48 bg-gray-900 rounded-lg border border-gray-700 p-2">
              <!-- Items appear here dynamically -->
            </div>
          </div>
          <button onclick="openModal('your')" class="w-full mt-4 bg-green-600 hover:bg-green-500 py-3 rounded-lg font-bold shadow-lg transition text-xl text-white">+ Add Item</button>
        </div>

        <!-- Their Offer -->
        <div class="flex-1 bg-panel p-4 rounded-lg border-2 border-red-500/50 relative flex flex-col justify-between">
          <div>
            <h3 class="text-center font-bold text-red-400 mb-1">THEIR OFFER</h3>
            <div id="their-total" class="text-center text-2xl font-black mb-4 text-white">0</div>
            <div id="their-offer-grid" class="grid grid-cols-2 gap-2 min-h-48 bg-gray-900 rounded-lg border border-gray-700 p-2">
              <!-- Items appear here dynamically -->
            </div>
          </div>
          <button onclick="openModal('their')" class="w-full mt-4 bg-red-600 hover:bg-red-500 py-3 rounded-lg font-bold shadow-lg transition text-xl text-white">+ Add Item</button>
        </div>
      </div>
    </section>

    <!-- VIEW 2: VALUE LIST -->
    <section id="view-values" class="hidden">
      <!-- Search and Filter Bar -->
      <div class="bg-panel p-4 rounded-lg border border-gray-700 mb-6 flex flex-col md:flex-row gap-4 justify-between items-center">
        <input type="text" id="value-search" placeholder="Search for a fruit or gamepass..." oninput="filterValueList()" class="w-full md:w-1/2 bg-gray-900 text-white p-3 rounded-lg border border-gray-600 focus:outline-none focus:border-blue-500">
        
        <!-- Category Filter Tabs -->
        <div class="flex space-x-2 overflow-x-auto w-full md:w-auto pb-1 md:pb-0" id="value-category-tabs">
          <button onclick="setValueCategory('All')" class="val-cat-btn px-4 py-2 rounded-lg bg-blue-600 font-bold text-white text-sm whitespace-nowrap" data-cat="All">All</button>
          <button onclick="setValueCategory('Physical')" class="val-cat-btn px-4 py-2 rounded-lg bg-gray-800 hover:bg-gray-700 font-bold text-gray-300 text-sm whitespace-nowrap" data-cat="Physical">Physical</button>
          <button onclick="setValueCategory('Perm')" class="val-cat-btn px-4 py-2 rounded-lg bg-gray-800 hover:bg-gray-700 font-bold text-gray-300 text-sm whitespace-nowrap" data-cat="Perm">Permanent</button>
          <button onclick="setValueCategory('Gamepass')" class="val-cat-btn px-4 py-2 rounded-lg bg-gray-800 hover:bg-gray-700 font-bold text-gray-300 text-sm whitespace-nowrap" data-cat="Gamepass">Gamepasses</button>
        </div>
      </div>

      <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="value-list-grid">
        <!-- Rendered via JS -->
      </div>
    </section>

  </main>

  <!-- ITEM SELECTION MODAL POPUP -->
  <div id="item-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50 hidden">
    <div class="bg-panel border border-gray-700 w-full max-w-2xl mx-4 rounded-xl shadow-2xl p-6 flex flex-col max-h-[85vh]">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-xl font-bold text-white">Select an Item</h3>
        <button onclick="closeModal()" class="text-gray-400 hover:text-white text-3xl font-bold leading-none">&times;</button>
      </div>

      <!-- Search Bar -->
      <input type="text" id="modal-search" placeholder="Search..." oninput="renderModalItems()" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-white mb-3 focus:outline-none focus:border-blue-500">
      
      <!-- Modal Category Tabs -->
      <div class="flex space-x-2 overflow-x-auto mb-4 pb-1" id="modal-category-tabs">
        <button onclick="setModalCategory('All')" class="modal-cat-btn px-3 py-1.5 rounded-lg bg-blue-600 font-bold text-white text-xs whitespace-nowrap" data-cat="All">All</button>
        <button onclick="setModalCategory('Physical')" class="modal-cat-btn px-3 py-1.5 rounded-lg bg-gray-800 hover:bg-gray-700 font-bold text-gray-300 text-xs whitespace-nowrap" data-cat="Physical">Physical</button>
        <button onclick="setModalCategory('Perm')" class="modal-cat-btn px-3 py-1.5 rounded-lg bg-gray-800 hover:bg-gray-700 font-bold text-gray-300 text-xs whitespace-nowrap" data-cat="Perm">Permanent</button>
        <button onclick="setModalCategory('Gamepass')" class="modal-cat-btn px-3 py-1.5 rounded-lg bg-gray-800 hover:bg-gray-700 font-bold text-gray-300 text-xs whitespace-nowrap" data-cat="Gamepass">Gamepasses</button>
      </div>

      <div id="modal-item-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3 overflow-y-auto p-1 max-h-96">
        <!-- Populated dynamically -->
      </div>
    </div>
  </div>

  <!-- Bottom Ad Zone -->
  <div class="max-w-6xl mx-auto w-full my-6 bg-gray-800 h-16 flex items-center justify-center text-gray-500 text-sm border border-dashed border-gray-600 rounded-lg">
    [ Ad Banner Space - Mobile / Bottom ]
  </div>

  <!-- Footer -->
  <footer class="bg-panel p-6 text-center text-sm text-gray-500 border-t border-gray-800 mt-auto">
    <p>Not affiliated with Roblox or Gamer Robot.</p>
    <div class="flex justify-center space-x-4 mt-2">
      <a href="#" class="hover:text-white">Privacy Policy</a>
      <a href="#" class="hover:text-white">Terms of Service</a>
      <a href="#" class="hover:text-white">Contact</a>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
