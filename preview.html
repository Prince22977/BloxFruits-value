<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 flex items-center justify-center min-h-screen p-8">

  <!-- Exact 1200x630 Canvas Container -->
  <div class="w-[1200px] h-[630px] bg-slate-900 border-4 border-slate-800 rounded-2xl flex flex-col items-center justify-center relative overflow-hidden text-center p-12 shadow-2xl">
    
    <!-- Background Glow Effect -->
    <div class="absolute w-[600px] h-[600px] bg-blue-600/20 rounded-full blur-3xl pointer-events-none"></div>

    <!-- Title -->
    <h1 class="text-6xl font-black text-blue-400 tracking-wider uppercase mb-2 z-10">BLOX FRUITS</h1>
    <h2 class="text-5xl font-black text-white tracking-wide uppercase mb-6 z-10">VALUE & TRADE CALCULATOR</h2>

    <!-- Subtitle -->
    <p class="text-xl text-slate-400 font-semibold max-w-2xl mb-10 z-10">
      Real-Time W / F / L Trade Fairness Calculator & Demand Ratings
    </p>

    <!-- W / F / L Badges -->
    <div class="flex space-x-6 z-10 mb-10">
      <span class="px-8 py-3 rounded-xl bg-green-950/60 border-2 border-green-500 text-green-400 font-black text-2xl">WIN (W)</span>
      <span class="px-8 py-3 rounded-xl bg-yellow-950/60 border-2 border-yellow-500 text-yellow-400 font-black text-2xl">FAIR (F)</span>
      <span class="px-8 py-3 rounded-xl bg-red-950/60 border-2 border-red-500 text-red-400 font-black text-2xl">LOSS (L)</span>
    </div>

    <!-- Domain Branding -->
    <div class="text-blue-400 font-bold text-lg tracking-widest z-10">
      blox-fruits-value.vercel.app
    </div>

  </div>

</body>
</html>
