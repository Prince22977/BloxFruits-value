<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - Blox Fruits Value Calculator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #121212; color: #d1d5db; }
    .bg-panel { background-color: #1e1e24; }
  </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

  <header class="bg-panel border-b border-gray-800 p-4">
    <div class="max-w-4xl mx-auto flex justify-between items-center">
      <a href="index.html" class="text-xl font-black text-blue-500 tracking-wider">BLOX VALUES</a>
      <a href="index.html" class="text-sm bg-blue-600 hover:bg-blue-500 text-white font-bold px-4 py-2 rounded-lg transition">&larr; Back to Calculator</a>
    </div>
  </header>

  <main class="max-w-xl mx-auto p-6 my-8 bg-panel border border-gray-800 rounded-xl space-y-6 w-full">
    <h1 class="text-3xl font-black text-white border-b border-gray-700 pb-4 text-center">Contact Us</h1>
    <p class="text-sm text-gray-400 text-center">Have a suggestion, value update, or business inquiry? Get in touch with us!</p>

    <form class="space-y-4" onsubmit="event.preventDefault(); alert('Message sent successfully!');">
      <div>
        <label class="block text-xs font-bold text-gray-300 uppercase mb-1">Your Name</label>
        <input type="text" placeholder="Roblox Player" required class="w-full bg-gray-900 border border-gray-700 rounded p-2.5 text-white focus:outline-none focus:border-blue-500">
      </div>
      <div>
        <label class="block text-xs font-bold text-gray-300 uppercase mb-1">Email Address</label>
        <input type="email" placeholder="you@example.com" required class="w-full bg-gray-900 border border-gray-700 rounded p-2.5 text-white focus:outline-none focus:border-blue-500">
      </div>
      <div>
        <label class="block text-xs font-bold text-gray-300 uppercase mb-1">Message</label>
        <textarea rows="4" placeholder="How can we help?" required class="w-full bg-gray-900 border border-gray-700 rounded p-2.5 text-white focus:outline-none focus:border-blue-500"></textarea>
      </div>
      <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg transition">Send Message</button>
    </form>
  </main>

  <footer class="p-6 text-center text-xs text-gray-500">
    <a href="index.html" class="hover:underline">Home</a> | 
    <a href="privacy.html" class="hover:underline">Privacy Policy</a> | 
    <a href="terms.html" class="hover:underline">Terms of Service</a>
  </footer>

</body>
</html>
